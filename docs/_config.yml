title: 大有团队手册
description: 大有内容运营与入职协作门户
lang: zh-CN
url: "https://alyciabhz.github.io"
baseurl: "/dayou-content"

remote_theme: just-the-docs/just-the-docs@v0.10.0
plugins:
  - jekyll-remote-theme

color_scheme: dark

mermaid:
  version: "10.6.1"

callouts:
  important:
    title: 重要
    color: red
  note:
    title: 注意
    color: yellow
  tip:
    title: 提示
    color: blue

search_enabled: true
heading_anchors: true
back_to_top: true
back_to_top_text: 返回顶部
nav_sort: case_insensitive

aux_links:
  GitHub 仓库:
    - https://github.com/AlyciaBHZ/dayou-content
  新建 Issue:
    - https://github.com/AlyciaBHZ/dayou-content/issues/new/choose

footer_content: "Dayou（大有）内容团队手册：给内容运营、大师顾问与协作伙伴的清晰工作入口。"
