title: Dayou 协作门户
description: Dayou 三个核心仓库的统一协作入口
lang: zh-CN
url: "https://alyciabhz.github.io"
baseurl: "/dayou-content"

remote_theme: just-the-docs/just-the-docs@v0.10.0
plugins:
  - jekyll-remote-theme

color_scheme: dark

mermaid:
  version: "10.6.1"

callouts:
  important:
    title: 重要
    color: red
  note:
    title: 注意
    color: yellow
  tip:
    title: 提示
    color: blue

search_enabled: true
heading_anchors: true
back_to_top: true
back_to_top_text: 返回顶部
nav_sort: case_insensitive

aux_links:
  GitHub 仓库:
    - https://github.com/DayouProject/dayou-content
  新建 Issue:
    - https://github.com/DayouProject/dayou-content/issues/new/choose

footer_content: "Dayou 协作门户：给三个核心仓库使用者的统一工作入口。"
